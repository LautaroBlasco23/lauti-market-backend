services:
  postgres:
    image: postgres:16-alpine
    container_name: lauti-market-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: lauti_market
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - lauti_market_postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lauti_market"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - lauti-market-network

  redis:
    image: redis:7-alpine
    container_name: lauti-market-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - lauti-market-network

volumes:
  lauti_market_postgres_data:
  redis_data:

networks:
  lauti-market-network:
    driver: bridge
