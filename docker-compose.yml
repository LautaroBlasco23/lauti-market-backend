services:
  postgres:
    image: postgres:16-alpine
    container_name: lauti-market-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gamedb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lauti-market-network

  redis:
    image: redis:7-alpine
    container_name: lauti-market-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lauti-market-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lauti-market-api
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/gamedb?sslmode=disable
      - REDIS_URL=redis:6379
      - PORT=8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lauti-market-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  lauti-market-network:
    driver: bridge
