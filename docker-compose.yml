services:
  postgres:
    image: postgres:16-alpine
    container_name: lauti-market-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lauti_market
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lauti-market-network

  redis:
    image: redis:7-alpine
    container_name: lauti-market-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lauti-market-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lauti-market-api
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/lauti_market?sslmode=disable
      - REDIS_URL=redis:6379
      - PORT=8080
      - IMAGE_STORE_ADDR=image-storage:50051
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      image-storage:
        condition: service_started
    networks:
      - lauti-market-network
    restart: unless-stopped

  image-storage:
    build:
      context: ../../image-storage
      dockerfile: Dockerfile
    container_name: lauti-market-image-storage
    ports:
      - "50051:50051"
      - "8087:8087"
    environment:
      - STORAGE_BACKEND=local
      - BASE_URL=http://localhost:8087
    volumes:
      - image_storage_data:/app/images
    networks:
      - lauti-market-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  image_storage_data:

networks:
  lauti-market-network:
    driver: bridge
